<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FAFAFA">
    <title>添加旅程 - HSN Journey Traces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="add-page detail-page is-editing">
    <nav class="navbar">
        <div class="nav-brand">HSN Journey Traces</div>
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">☰</label>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="cities.html">城市足迹</a></li>
            <li><a href="map.html">足迹地图</a></li>
            <li><a href="wishlist.html">心愿单</a></li>
        </ul>
    </nav>

    <main id="main" class="container" tabindex="-1" data-mode="edit">
        <a href="cities.html" class="back-link">&larr; 返回城市足迹</a>
        <div class="action-bar" id="action-bar">
            <button class="btn btn-secondary" type="button" id="add-action-edit" disabled><span>编辑</span></button>
            <button class="btn btn-primary" type="button" id="add-action-save"><span>保存</span></button>
        </div>

        <form class="edit-form subcard-page-form" id="add-form" novalidate>
            <section class="form-section">
                <div class="form-group subcard-parent-field">
                    <label for="add-parent">归属一级卡片</label>
                    <select id="add-parent" name="parent">
                        <option value="new">新建一级卡片</option>
                    </select>
                </div>
                <div class="form-row subcard-page-form__basic">
                    <div class="form-group">
                        <label for="add-emoji">图标</label>
                        <input type="text" id="add-emoji" name="emoji" maxlength="4" value="📍" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="add-city">城市 *</label>
                        <input type="text" id="add-city" name="city" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="add-province">省份/大区</label>
                        <input type="text" id="add-province" name="province" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="add-region-type">国内/国外</label>
                        <select id="add-region-type" name="region-type">
                            <option value="domestic" selected>国内</option>
                            <option value="international">国外</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="form-section">
                <h2 class="form-section__title">费用</h2>
                <div class="form-row subcard-page-form__costs">
                    <div class="form-group"><label for="add-cost-package">报团费</label><input type="number" id="add-cost-package" min="0" inputmode="numeric"></div>
                    <div class="form-group"><label for="add-cost-transport">交通费</label><input type="number" id="add-cost-transport" min="0" inputmode="numeric"></div>
                    <div class="form-group"><label for="add-cost-accommodation">住宿费</label><input type="number" id="add-cost-accommodation" min="0" inputmode="numeric"></div>
                    <div class="form-group"><label for="add-cost-food">餐饮费</label><input type="number" id="add-cost-food" min="0" inputmode="numeric"></div>
                    <div class="form-group"><label for="add-cost-shopping">购物费</label><input type="number" id="add-cost-shopping" min="0" inputmode="numeric"></div>
                    <div class="form-group"><label for="add-cost-ticket">门票费</label><input type="number" id="add-cost-ticket" min="0" inputmode="numeric"></div>
                </div>
            </section>

            <section class="form-section">
                <h2 class="form-section__title">行程</h2>
                <div id="add-itinerary-editor"></div>
            </section>

            <section class="form-section">
                <h2 class="form-section__title">照片</h2>
                <div class="photo-input">
                    <label for="add-photo-input" class="photo-input__drop" id="add-photo-label">
                        <span class="photo-input__icon" aria-hidden="true"></span>
                        <span class="photo-input__text">点击或拖拽上传照片</span>
                        <span class="photo-input__hint">JPG / PNG · 自动压缩至 1600px，保存到 data/journeys.json</span>
                    </label>
                    <input type="file" id="add-photo-input" accept="image/*" hidden>
                </div>
                <div class="photo-preview is-hidden" id="add-photo-preview">
                    <img id="add-photo-img" src="" alt="行程照片">
                    <button type="button" class="icon-btn icon-btn--sm photo-preview__remove" id="add-photo-remove" aria-label="移除照片"></button>
                </div>
            </section>
        </form>
    </main>

    <footer class="footer">
        <p>HSN Journey Traces - 用脚步丈量世界</p>
    </footer>

    <script src="data.js"></script>
    <script src="icons.js"></script>
    <script src="ui.js"></script>
    <script src="add.js"></script>
</body>
</html>
