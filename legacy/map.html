<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FAFAFA">
    <title>足迹地图 - HSN Journey Traces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="map-page">
    <nav class="navbar">
        <div class="nav-brand">HSN Journey Traces</div>
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">☰</label>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="cities.html">城市足迹</a></li>
            <li><a href="map.html" class="active">足迹地图</a></li>
            <li><a href="wishlist.html">心愿单</a></li>
        </ul>
    </nav>

    <main id="main" class="map-stage" tabindex="-1">
        <aside class="map-overlay" id="map-overlay" aria-label="地图说明">
            <span class="map-overlay__handle" aria-hidden="true"></span>
            <button class="icon-btn icon-btn--sm map-overlay__close" type="button" id="map-overlay-close" aria-label="收起说明卡"></button>
            <h1 class="map-overlay__title">
                <span class="map-overlay__title-icon" aria-hidden="true"></span>
                <span>我的足迹地图</span>
            </h1>
            <p class="map-overlay__desc">点击标记查看旅行记录</p>
            <div class="map-legend" role="group" aria-label="图例">
                <div class="legend-item">
                    <span class="legend-dot legend-dot--domestic" aria-hidden="true"></span>
                    <span>国内</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot legend-dot--international" aria-hidden="true"></span>
                    <span>国外</span>
                </div>
            </div>
        </aside>
        <button class="map-overlay-trigger icon-btn icon-btn--lg" type="button" id="map-overlay-open" aria-label="显示说明卡"></button>
        <div id="world-map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="icons.js"></script>
    <script src="ui.js"></script>
    <script src="map.js"></script>
</body>
</html>
