<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FAFAFA">
    <title>城市足迹 - HSN Journey Traces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">HSN Journey Traces</div>
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">☰</label>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="cities.html" class="active">城市足迹</a></li>
            <li><a href="map.html">足迹地图</a></li>
            <li><a href="wishlist.html">心愿单</a></li>
        </ul>
    </nav>

    <main id="main" class="container" tabindex="-1">
        <h1 class="page-title">我的城市足迹</h1>
        <div class="cities-toolbar">
            <div class="search-input">
                <span class="search-input__icon" aria-hidden="true"></span>
                <input type="search" id="city-search" placeholder="搜索城市、景点或国家…" aria-label="搜索旅程" autocomplete="off">
            </div>
            <div class="cities-filters" role="group" aria-label="筛选旅程">
                <button class="filter-chip is-active" type="button" data-filter="all" aria-pressed="true">全部</button>
                <button class="filter-chip" type="button" data-filter="domestic" aria-pressed="false">国内</button>
                <button class="filter-chip" type="button" data-filter="international" aria-pressed="false">国外</button>
            </div>
            <div class="cities-actions">
                <button class="btn btn-secondary" type="button" id="toggle-all-btn">展开全部</button>
                <a href="add.html" class="btn btn-primary">添加旅程</a>
            </div>
        </div>
        <div class="city-grid" id="city-grid"></div>
    </main>

    <footer class="footer">
        <p>HSN Journey Traces - 用脚步丈量世界</p>
    </footer>

    <script src="data.js"></script>
    <script src="icons.js"></script>
    <script src="ui.js"></script>
    <script src="cities.js"></script>
</body>
</html>
