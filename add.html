<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FAFAFA">
    <title>添加旅程 - HSN Journey Traces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="add-page">
    <nav class="navbar">
        <div class="nav-brand">HSN Journey Traces</div>
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">☰</label>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="cities.html">城市足迹</a></li>
            <li><a href="map.html">足迹地图</a></li>
            <li><a href="wishlist.html">心愿单</a></li>
        </ul>
    </nav>

    <main id="main" class="container" tabindex="-1">
        <a href="index.html" class="back-link">&larr; 返回首页</a>
        <h1 class="page-title">添加新旅程</h1>

        <article class="add-preview" id="add-preview" aria-live="polite">
            <div class="add-preview__emoji" id="add-preview-emoji" aria-hidden="true">📍</div>
            <div class="add-preview__body">
                <h2 class="add-preview__title" id="add-preview-title">未命名旅程</h2>
                <p class="add-preview__meta" id="add-preview-meta">填写信息以预览</p>
            </div>
        </article>

        <form class="edit-form" id="add-form" novalidate>
            <section class="form-section" aria-labelledby="sec-basic">
                <h2 class="form-section__title" id="sec-basic">基本信息</h2>
                <div class="form-row dense">
                    <div class="form-group">
                        <label for="add-province">省份 / 大区 *</label>
                        <input type="text" id="add-province" name="province" placeholder="例如：福建" required autocomplete="off">
                        <span class="form-error" id="err-province" aria-live="polite"></span>
                    </div>
                    <div class="form-group">
                        <label for="add-city">城市 *</label>
                        <input type="text" id="add-city" name="city" placeholder="例如：厦门" required autocomplete="off">
                        <span class="form-error" id="err-city" aria-live="polite"></span>
                    </div>
                    <div class="form-group">
                        <label for="add-emoji">封面 Emoji</label>
                        <input type="text" id="add-emoji" name="emoji" placeholder="例如：🏝️" maxlength="4" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label for="add-name">旅程名称 *</label>
                    <input type="text" id="add-name" name="name" placeholder="例如：冬日厦门海滨漫游" required autocomplete="off">
                    <span class="form-hint">留空时将以"省份·城市"自动生成</span>
                    <span class="form-error" id="err-name" aria-live="polite"></span>
                </div>
            </section>

            <section class="form-section" aria-labelledby="sec-time">
                <h2 class="form-section__title" id="sec-time">时间</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="add-date">开始日期 *</label>
                        <input type="date" id="add-date" name="date" required>
                        <span class="form-error" id="err-date" aria-live="polite"></span>
                    </div>
                    <div class="form-group">
                        <label for="add-endDate">结束日期</label>
                        <input type="date" id="add-endDate" name="endDate">
                        <span class="form-hint">未填则与开始日期相同</span>
                    </div>
                </div>
            </section>

            <section class="form-section" aria-labelledby="sec-cost">
                <h2 class="form-section__title" id="sec-cost">费用（元）</h2>
                <div class="form-row dense">
                    <div class="form-group">
                        <label for="add-cost-package">报团费</label>
                        <input type="number" id="add-cost-package" name="package" placeholder="0" min="0" inputmode="numeric">
                    </div>
                    <div class="form-group">
                        <label for="add-cost-transport">交通费</label>
                        <input type="number" id="add-cost-transport" name="transport" placeholder="0" min="0" inputmode="numeric">
                    </div>
                    <div class="form-group">
                        <label for="add-cost-accommodation">住宿费</label>
                        <input type="number" id="add-cost-accommodation" name="accommodation" placeholder="0" min="0" inputmode="numeric">
                    </div>
                    <div class="form-group">
                        <label for="add-cost-food">餐饮费</label>
                        <input type="number" id="add-cost-food" name="food" placeholder="0" min="0" inputmode="numeric">
                    </div>
                </div>
            </section>

            <section class="form-section" aria-labelledby="sec-highlights">
                <h2 class="form-section__title" id="sec-highlights">亮点 &amp; 行程</h2>
                <div class="form-group">
                    <label for="add-highlights">景点亮点</label>
                    <input type="text" id="add-highlights" name="highlights" placeholder="例如：鼓浪屿、厦门大学、南普陀寺" autocomplete="off">
                    <span class="form-hint">用 、 或 , 分隔多个亮点</span>
                </div>
                <p class="form-hint">详细行程可在保存后到旅程详情页中编辑添加。</p>
            </section>

            <section class="form-section" aria-labelledby="sec-photo">
                <h2 class="form-section__title" id="sec-photo">封面照片</h2>
                <div class="photo-input">
                    <label for="add-photo" class="photo-input__drop" id="add-photo-label">
                        <span class="photo-input__icon" aria-hidden="true"></span>
                        <span class="photo-input__text">点击或拖拽上传照片</span>
                        <span class="photo-input__hint">JPG / PNG · 自动压缩至 1600px</span>
                    </label>
                    <input type="file" id="add-photo" name="photo" accept="image/*" hidden>
                </div>
                <div class="photo-preview is-hidden" id="add-photo-preview" aria-live="polite">
                    <img id="add-photo-img" alt="已选择的封面照片">
                    <button type="button" class="icon-btn icon-btn--sm photo-preview__remove" id="add-photo-remove" aria-label="移除照片"></button>
                </div>
            </section>

            <div class="sticky-actions">
                <div class="sticky-actions__inner">
                    <button type="button" class="btn btn-secondary" id="add-cancel-btn">取消</button>
                    <button type="submit" class="btn btn-primary" id="add-save-btn">保存旅程</button>
                </div>
            </div>
        </form>
    </main>

    <footer class="footer">
        <p>HSN Journey Traces - 用脚步丈量世界</p>
    </footer>

    <script src="data.js"></script>
    <script src="icons.js"></script>
    <script src="ui.js"></script>
    <script src="add.js"></script>
</body>
</html>
