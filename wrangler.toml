name = "hsn-journeys"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"
workers_dev = true
account_id = "095ef4fd66803e2e321e1007ec4ce890"
routes = [
  { pattern = "hsncat.fun", zone_name = "hsncat.fun", custom_domain = true }
]

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "hsn-journeys-db"
database_id = "bc418bd7-20e0-4e31-881e-39a709732cfc"

[[r2_buckets]]
binding = "R2"
bucket_name = "hsn-journeys-photos"

[vars]
PUBLIC_SITE_NAME = "HSN Journey Traces"

# Deployment secrets are configured with `wrangler secret put`, not stored here.
# wrangler secret put JWT_SECRET
