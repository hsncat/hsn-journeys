name = "hsn-journeys"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"
account_id = "095ef4fd66803e2e321e1007ec4ce890"
workers_dev = true

# 静态资产由 Astro 构建产物提供
[assets]
directory = "./dist"
binding = "ASSETS"

# D1 数据库绑定（创建数据库后用 database_id 替换占位符）
[[d1_databases]]
binding = "DB"
database_name = "hsn-journeys-db"
database_id = "bc418bd7-20e0-4e31-881e-39a709732cfc"

# R2 对象存储绑定
[[r2_buckets]]
binding = "R2"
bucket_name = "hsn-journeys-photos"

# 环境变量（公开值；密钥用 wrangler secret put 添加）
[vars]
PUBLIC_SITE_NAME = "HSN Journey Traces"

# 部署后台 secret：
#   wrangler secret put JWT_SECRET   # 32 字节随机字符串
