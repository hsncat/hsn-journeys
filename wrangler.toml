name = "hsn-journeys"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"
workers_dev = true

# 你的 Cloudflare 账户 ID（在 dashboard 右下角可见，或运行 `wrangler whoami`）
account_id = "095ef4fd66803e2e321e1007ec4ce890"

# Astro 构建出来的静态资产
[assets]
directory = "./dist"
binding = "ASSETS"

# D1 数据库绑定
#   创建：wrangler d1 create hsn-journeys-db
#   把上一条命令输出的 database_id 填到下面
[[d1_databases]]
binding = "DB"
database_name = "hsn-journeys-db"
database_id = "bc418bd7-20e0-4e31-881e-39a709732cfc"

# R2 对象存储绑定（用于照片）
#   创建：wrangler r2 bucket create hsn-journeys-photos
[[r2_buckets]]
binding = "R2"
bucket_name = "hsn-journeys-photos"

# 公开环境变量
[vars]
PUBLIC_SITE_NAME = "HSN Journey Traces"

# 部署密钥（通过 `wrangler secret put` 设置，不写在本文件）：
#   wrangler secret put JWT_SECRET    # 32 字节随机字符串，用于签发 JWT
